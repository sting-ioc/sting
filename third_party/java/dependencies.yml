  - coord: org.realityforge.braincheck:braincheck-core:1.33.0
  - coord: javax.inject:javax.inject:1
  - coord: com.squareup:javapoet:1.13.0
    repositoryName: squareup_javapoet
    java:
      name: squareup_javapoet
  - coord: com.google.dagger:dagger:2.25.2
  - coord: com.google.dagger:dagger-gwt:2.25.2
  - coord: com.google.dagger:dagger-producers:2.25.2
