# DO NOT EDIT GENERATED BUILD CONTENT: run tools/update_java_deps.sh after editing this file.

repositories:
  - name: central
    url: https://repo.maven.apache.org/maven2
options:
  workspaceDirectory: ../..
  nameStrategy: ArtifactId
  repositoryNameStrategy: ArtifactId
  repositoryRuleGenerationStrategy: module
  targetGenerationStrategy: build
  failOnMissingPom: false

artifacts:
  - coord: org.realityforge.javax.annotation:javax.annotation:1.1.1
  - coord: com.palantir.javapoet:javapoet:0.14.0
    excludes:
      - com.palantir.javapoet:javapoet-root
  - coord: org.realityforge.proton:proton-core:0.72
  - coord: org.realityforge.proton:proton-qa:0.72
  - coord: org.glassfish:javax.json:1.1
  - coord: com.google.guava:guava:27.1-jre
  - coord: com.google.guava:failureaccess:1.0.1
  # Processor tests need javaemul.internal.annotations.DoNotInline to exercise @Injector.gwt
  # AUTODETECT/ENABLE output without pulling the full GWT user jar into Bazel builds.
  - coord: org.realityforge.javaemul.internal.annotations:javaemul.internal.annotations:0.01
  # GWT 2.11.0 reaches legacy artifacts that have no source jar in Maven Central.
  - coord: avalon-framework:avalon-framework
    includeSource: false
  - coord: colt:colt
    includeSource: false
  - coord: tapestry:tapestry
    includeSource: false
  # GWT transitives contain two unrelated apache-jsp artifacts with the same artifactId.
  - coord: org.eclipse.jetty:apache-jsp
    repositoryName: jetty_apache_jsp
    java:
      name: jetty_apache_jsp
  - coord: org.mortbay.jasper:apache-jsp
    repositoryName: mortbay_apache_jsp
    java:
      name: mortbay_apache_jsp
  # Performance benchmark dependencies mirror the Buildr performance-tests classpath.
  - coord: org.gwtproject:gwt-user:2.11.0
  - coord: org.gwtproject:gwt-dev:2.11.0
  - coord: javax.validation:validation-api:1.0.0.GA
