plan:
  id: server-transactional
  status: accepted
  active_task: null
  required_full_gate: "bundle exec buildr test"
  optional_gate: "bundle exec buildr ci J2CL=no"

tasks:
  - id: PLAN-01
    title: Create draft planning artifacts
    status: completed
    priority: high
    depends_on: []
    acceptance_criteria:
      - Requirements document records mission, scope, locked decisions, gates, and open questions.
      - Transaction semantics deep dive records TxType behavior and parity notes.
      - Implementation plan records phase sequence, risks, expected files, and acceptance criteria.
      - Task board records planned work and blocks implementation on open decisions and plan approval.
    files_touched:
      - plans/server-transactional/00-requirements.md
      - plans/server-transactional/01-transaction-semantics.md
      - plans/server-transactional/10-implementation-plan.md
      - plans/server-transactional/20-task-board.yaml
    evidence:
      - command: "git status --short"
        result: "Clean before planning artifacts were added."
      - command: "find plans -maxdepth 3 -type f -print | sort"
        result: "Existing completed enum-template plan identified; new server-transactional plan created separately."
    commit:
      hash: not_required
      message: "Planning artifact creation only; no commit requested."
    history:
      - "Draft plan created from grill-session decisions with Q-06 open."

  - id: DECISION-01
    title: Resolve UserTransaction restriction scope
    status: completed
    priority: high
    depends_on:
      - PLAN-01
    acceptance_criteria:
      - Q-06 is resolved in 00-requirements.md.
      - 01-transaction-semantics.md records the selected behavior or divergence.
      - 10-implementation-plan.md Decision Log records the outcome.
      - Task board sequencing reflects the selected scope.
    files_touched:
      - plans/server-transactional/00-requirements.md
      - plans/server-transactional/01-transaction-semantics.md
      - plans/server-transactional/10-implementation-plan.md
      - plans/server-transactional/20-task-board.yaml
    evidence:
      - command: "User decision"
        result: "Option A selected: omit JavaEE UserTransaction call restrictions in v1 and document as an intentional divergence."
    commit:
      hash: not_required
      message: "Planning decision only; no commit requested."
    history:
      - "Awaiting user decision on Q-06."
      - "Q-06 resolved as Option A and recorded in requirements, transaction semantics, implementation plan, and task board."

  - id: PLAN-APPROVAL
    title: User review and plan acceptance
    status: completed
    priority: high
    depends_on:
      - DECISION-01
    acceptance_criteria:
      - User is asked to review the latest plan after Q-06 is resolved.
      - User feedback is incorporated into planning artifacts.
      - Plan status changes to accepted only after review outcome is recorded.
    files_touched:
      - plans/server-transactional/00-requirements.md
      - plans/server-transactional/01-transaction-semantics.md
      - plans/server-transactional/10-implementation-plan.md
      - plans/server-transactional/20-task-board.yaml
    evidence:
      - command: "User instruction"
        result: "User requested implementation in subagent after iterative plan review completed with Findings: none."
    commit:
      hash: not_required
      message: "Plan approval only; no commit requested."
    history:
      - "Q-06 is resolved; awaiting latest-plan review and approval."
      - "Plan accepted after iterative plan review completed with no findings and user requested implementation."

  - id: BUILD-01
    title: Add server module build wiring
    status: completed
    priority: high
    depends_on:
      - PLAN-APPROVAL
    acceptance_criteria:
      - build.yaml defines javax_transaction_api.
      - buildfile defines server and server-integration-tests projects.
      - server packages jar, sources, and javadoc.
      - aggregate Javadoc includes server.
      - server stays out of processor shading and unrelated integration test classpaths.
    files_touched:
      - build.yaml
      - buildfile
    evidence:
      - command: "Worker subagent dispatch"
        result: "Implementation requested in worker subagent; main thread retains plan artifact ownership."
      - command: "bundle exec buildr sting:server:package"
        result: "exit 0; server jar, sources jar, and javadoc jar packaged successfully."
    commit:
      hash: 5d666cbe405d99b4a73c0977cd53c6c188eff873
      message: "feat(server): add JTA transactional interceptors"
    history:
      - "Added javax_transaction_api artifact, server project, server-integration-tests project, and aggregate Javadoc wiring."

  - id: API-01
    title: Add Transactional API and interceptors
    status: completed
    priority: high
    depends_on:
      - BUILD-01
    acceptance_criteria:
      - Transactional annotation matches accepted API shape.
      - Concrete interceptors are public, @Injectable, and constructor-inject TransactionManager.
      - Transactional, TxType, all public concrete interceptors, and package-info.java have concise Javadocs.
      - Package-private base/helper implements accepted semantics.
      - No JNDI or global lookup exists in server code.
    files_touched:
      - server/src/main/java/sting/server/*.java
    evidence:
      - command: "Main-thread implementation review"
        result: "Transactional annotation, six concrete interceptors, package-private support base, constructor-injected TransactionManager, and no-JNDI scope match the accepted API plan."
    commit:
      hash: 5d666cbe405d99b4a73c0977cd53c6c188eff873
      message: "feat(server): add JTA transactional interceptors"
    history:
      - "Added sting.server.Transactional, TxType-specific interceptor classes, package-info.java, and shared transaction support logic."

  - id: TEST-01
    title: Add server transaction behavior tests
    status: completed
    priority: high
    depends_on:
      - API-01
    acceptance_criteria:
      - Fake TransactionManager records exact operation order.
      - Tests cover all six TxTypes.
      - Tests cover unchecked rollback marking, checked exception behavior, started transaction completion, and
        precondition exceptions.
      - Tests cover forced rollback after unchecked Invocation.proceed failures for transactions started by the
        interceptor, including inner-interceptor failures and the case where setRollbackOnly fails.
      - Tests cover JTA operation failures from initial getTransaction, begin, getStatus during completion, commit,
        rollback, suspend, resume, and setRollbackOnly.
      - Tests cover resume failure replacing an original application exception for REQUIRES_NEW and NOT_SUPPORTED.
      - Targeted server tests pass.
    files_touched:
      - server/src/test/java/sting/server/*.java
    evidence:
      - command: "bundle exec buildr sting:server:test"
        result: "exit 0 in warm run."
      - command: "bundle exec buildr sting:server:clean sting:server:test"
        result: "exit 0; TestNG reported 26 tests run, 26 passes, 0 failures, 0 skips."
      - command: "Plan implementation review round 1"
        result: "Valid finding: REQUIRES_NEW resume-after-completion-failure coverage was missing."
      - command: "bundle exec buildr sting:server:clean sting:server:test"
        result: "exit 0 after round 1 fix; TestNG reported 29 tests run, 29 passes, 0 failures, 0 skips."
    commit:
      hash: 5d666cbe405d99b4a73c0977cd53c6c188eff873
      message: "feat(server): add JTA transactional interceptors"
    history:
      - "Added exact fake TransactionManager tests for all TxTypes, rollback behavior, suspend/resume cleanup, and JTA failure wrapping."
      - "Round 1 implementation review added REQUIRES_NEW resume-after-getStatus, resume-after-commit, and resume-after-rollback failure coverage."

  - id: INT-01
    title: Add server integration tests
    status: completed
    priority: high
    depends_on:
      - API-01
      - BUILD-01
      - TEST-01
    acceptance_criteria:
      - server-integration-tests compiles with annotation processing enabled.
      - Integration coverage proves default REQUIRED selection and at least one non-default TxType selection.
      - Targeted server integration tests pass.
    files_touched:
      - server-integration-tests/src/test/java/sting/server/integration/*.java
    evidence:
      - command: "bundle exec buildr sting:server-integration-tests:test"
        result: "exit 0 from worker subagent."
      - command: "bundle exec buildr sting:server-integration-tests:clean sting:server-integration-tests:test"
        result: "exit 0; TestNG reported 2 tests run, 2 passes, 0 failures, 0 skips."
    commit:
      hash: 5d666cbe405d99b4a73c0977cd53c6c188eff873
      message: "feat(server): add JTA transactional interceptors"
    history:
      - "Added generated-wiring coverage for default REQUIRED selection and non-default REQUIRES_NEW selection."

  - id: DOC-01
    title: Add server docs and changelog
    status: completed
    priority: medium
    depends_on:
      - API-01
    acceptance_criteria:
      - docs/server.md describes setup, behavior matrix, limitations, and intentional divergences.
      - Docs navigation links server.md.
      - Package and public-type Javadocs summarize TxType behavior and public interceptor purpose.
      - CHANGELOG records new module and @Transactional support.
    files_touched:
      - docs/server.md
      - website/sidebars.json
      - server/src/main/java/sting/server/Transactional.java
      - CHANGELOG.md
    evidence:
      - command: "Documentation review"
        result: "docs/server.md describes setup, behavior matrix, limitations, no JNDI/global lookup, and omitted UserTransaction restrictions; sidebar and changelog updated."
    commit:
      hash: 5d666cbe405d99b4a73c0977cd53c6c188eff873
      message: "feat(server): add JTA transactional interceptors"
    history:
      - "Added server user documentation, docs navigation entry, changelog entry, and concise public API Javadocs."

  - id: GATE-01
    title: Run full validation gate
    status: completed
    priority: high
    depends_on:
      - TEST-01
      - INT-01
      - DOC-01
    acceptance_criteria:
      - bundle exec buildr test exits 0.
      - Any failure is fixed or recorded as a blocker before completion.
    files_touched: []
    evidence:
      - command: "bundle exec buildr test"
        result: "exit 0; Buildr tested sting, core, doc-examples, downstream-test, integration-tests, performance-tests, processor, server, and server-integration-tests."
      - command: "bundle exec buildr test"
        result: "exit 0 after round 1 implementation-review fix."
    commit:
      hash: 5d666cbe405d99b4a73c0977cd53c6c188eff873
      message: "feat(server): add JTA transactional interceptors"
    history:
      - "Required full gate passed in main thread."
      - "Required full gate passed again after round 1 implementation-review fix."

