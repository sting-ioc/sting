  - id: MODEL-001
    title: Add processor metadata model for effective interceptor bindings
    status: pending
    priority: 1
    depends_on:
      - API-001
    acceptance_criteria:
      - "Effective bindings are represented per Binding plus ServiceSpec."
      - "Interceptor binding annotations are detected by simple-name meta-annotation policy and extracted into descriptors before plugin claim resolution."
      - "Proxy/service identity includes the full service coordinate, including qualifier."
      - "Service-interface and binding-source annotations are modeled separately then merged."
      - "Binding annotation values are available as compile-time constants for codegen."
      - "Synthetic proxy nodes and proxy descriptors are modeled per binding-service coordinate."
      - "Graph provider nodes are kind-aware so binding nodes and proxy nodes have explicit ids and metadata."
      - "Proxy node JSON and dot report output include stable proxy ids, service coordinates, target node ids, and interceptor node ids."
      - "Include-root unused validation treats proxy-reachable raw target and interceptor bindings as used without counting proxy nodes as include roots."
      - "Proxy descriptors track generated state to deduplicate source emission across injectors and rounds."
    files_touched:
      - "processor/src/main/java/sting/processor/*Interceptor*.java"
      - "processor/src/main/java/sting/processor/Binding.java"
      - "processor/src/main/java/sting/processor/ServiceSpec.java"
      - "processor/src/main/java/sting/processor/Registry.java"
      - "processor/src/main/java/sting/processor/Node.java"
      - "processor/src/main/java/sting/processor/ComponentGraph.java"
      - "processor/src/main/java/sting/processor/InjectorDotReportGenerator.java"
    evidence: []
