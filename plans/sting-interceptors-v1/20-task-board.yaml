      hash: "pending"
      message: "Model interceptor binding metadata"

  - id: SPI-001
    title: Add ServiceLoader plugin SPI
    status: pending
    priority: 2
    depends_on:
      - MODEL-001
    acceptance_criteria:
      - "Plugins are discovered from the annotation processor path with ServiceLoader."
      - "Exactly zero or one plugin may claim each effective descriptor keyed by binding id, service coordinate, binding annotation type, and normalized values."
      - "Plugin-only effective descriptors with empty implementedBy compile only when that descriptor is claimed."
      - "Plugin claim state is independent for the same annotation on different service coordinates."
      - "Plugin conflict diagnostics use stable plugin implementation class names."
      - "The v1 SPI exposes lifecycle-only emission and immutable metadata models."
      - "The v1 SPI public surface does not expose shaded Javapoet or Proton types."
      - "The v1 SPI cannot request graph/runtime dependencies."
      - "LifecycleCodeEmitter operations are specified for service type, method name, binding values, arguments, result, thrown, and raw statement emission."
      - "InterceptorBindingModel exposes annotation type, priority, service type, qualifier, and binding member values."
      - "InterceptedMethodModel exposes method name, return type, parameter types, thrown types, default-method flag, and varargs flag."
      - "An external-style test plugin compiles against only the public SPI."
    files_touched:
      - "processor/src/main/java/sting/processor/InterceptorCodeGenerator.java"
      - "processor/src/main/java/sting/processor/*Model.java"
      - "processor/src/main/java/sting/processor/StingProcessor.java"
      - "processor/src/test/**/*"
    evidence: []
    commit:
      hash: "pending"
      message: "Add interceptor plugin SPI"

  - id: VALID-001
    title: Validate interceptor binding usage
    status: pending
    priority: 1
    depends_on:
      - SPI-001
    acceptance_criteria:
      - "Valid locations are service interface type, injectable class, and fragment provider method."
      - "Method-level service/implementation bindings are rejected."
      - "Intercepted bindings publish service interfaces only."
      - "Duplicate binding annotation types and equal priorities fail with clear diagnostics."
      - "Reachability-scoped validation avoids unrelated annotation use."
      - "Input interception and nullable intercepted provider bindings are rejected in v1."
      - "Qualified intercepted services with the same type and different qualifiers remain distinct."
      - "Factory-generated injectable services are included when bindings are on the factory interface."
      - "Generic service interfaces and generic service methods are rejected for intercepted services."
      - "Binding annotations using @InterceptorBinding with @Retention(SOURCE) are rejected."
      - "`implementedBy` accepts canonical dotted names, including nested dotted names, and rejects binary names containing `$`."
      - "Third-party simple-name InterceptorBinding hooks require compatible priority and implementedBy members."
    files_touched:
      - "processor/src/main/java/sting/processor/StingProcessor.java"
      - "processor/src/test/fixtures/bad_input/**/*.java"
      - "processor/src/test/java/sting/processor/StingProcessorTest.java"
    evidence: []
    commit:
      hash: "pending"
      message: "Validate interceptor binding usage"

  - id: INT-001
    title: Resolve and validate generic interceptor implementations
    status: pending
    priority: 1
    depends_on:
      - VALID-001
    acceptance_criteria:
      - "`implementedBy` resolves to an effectively public @Injectable class."
      - "Interceptor injectables are auto-added to the graph."
      - "Lifecycle methods are public void instance methods, max one per phase, one lifecycle annotation per method, and no checked throws."
      - "Lifecycle methods are declared directly on the interceptor implementation class; inherited lifecycle annotations are rejected in v1."
      - "Supported parameter markers are validated by lifecycle phase and exact parameter type."
      - "Unannotated lifecycle parameters and multiple marker annotations on one parameter are rejected."
      - "`@BindingValue` member-to-parameter conversions match the requirements."
      - "At least one lifecycle method is required."
    files_touched:
      - "processor/src/main/java/sting/processor/StingProcessor.java"
      - "processor/src/main/java/sting/processor/ComponentGraph.java"
      - "processor/src/test/fixtures/**/*.java"
    evidence: []
    commit:
      hash: "pending"
      message: "Resolve interceptor components"

  - id: GEN-001
    title: Generate service-interface proxy classes
    status: pending
    priority: 1
    depends_on:
      - INT-001
    acceptance_criteria:
      - "One proxy is generated per intercepted binding plus service interface."
      - "Proxy lives where it can implement the service interface."
      - "Proxy target is typed as the service interface."
      - "Package-access service interfaces are constructed through a service-package bridge factory accepting Object/raw values where needed."
      - "Proxy implements inherited/default instance methods and excludes static/private/Object methods."
      - "Proxy supports overloaded methods, varargs methods, and explicitly redeclared Object methods."
      - "Generated lifecycle ordering matches the canonical nested template."
      - "An interceptor's own @AfterException is not invoked for its own @Before or @After failures, while outer interceptors still observe those failures."
      - "Generated code preserves checked exception signatures."
      - "Arguments/result metadata are allocated only when requested."
      - "Proxy source emission is deduplicated across multiple injectors."
    files_touched:
