    acceptance_criteria:
      - New per-comparison layout is implemented.
      - Existing monolithic build-time and code-size data is migrated.
      - Legacy migrated build-time rows validate without raw timing keys absent from old fixtures.
      - Newly generated release data validation catches missing required metadata, variants, and keys.
    files_touched:
      - performance-benchmarks/data/**
      - performance-benchmarks/src/main/java/**
      - performance-benchmarks/src/test/java/**
      - performance-tests/src/test/fixtures/**
    evidence:
      - command: >-
          bazel run //tools/java-format:palantir_java_format -- --palantir --replace $(find "$PWD/performance-benchmarks/src" -type f -name '*.java' | sort)
        result: pass
      - command: >-
          bazel build //performance-benchmarks:benchmark
        result: pass
      - command: >-
          bazel test //performance-benchmarks:all_tests
        result: "pass; 1 test target passes"
      - command: >-
          rg -n "gir|org\\.realityforge\\.gir" performance-benchmarks
        result: "pass; no GIR references"
      - command: >-
          ruby - <<'RUBY'
          old_files = {
            'build-times.properties' => 'performance-tests/src/test/fixtures/build-times.properties',
            'code-size.properties' => 'performance-tests/src/test/fixtures/code-size.properties'
          }
          old_files.each do |metric, old_path|
            by_version = Hash.new { |h, k| h[k] = [] }
            File.readlines(old_path, chomp: true).each do |line|
              next if line.strip.empty? || line.start_with?('#')
              key, value = line.split('=', 2)
              match = /\A(\d+\.\d+)\.(.+)\z/.match(key)
              raise "unparseable key #{key}" unless match
              by_version[match[1]] << [match[2], value]
            end
            by_version.each do |version, entries|
              new_path = File.join('performance-benchmarks/data', "sting-#{version}__dagger-2.25.2", metric)
              raise "missing #{new_path}" unless File.file?(new_path)
              new_entries = File.readlines(new_path, chomp: true).reject { |line| line.strip.empty? || line.start_with?('#') }.map { |line| line.split('=', 2) }
              expected = [
                ['sting.version', version],
                ['dagger.version', '2.25.2'],
                ['generated.by', 'bazel-performance-benchmarks']
              ] + entries
              raise "mismatch #{new_path}" unless new_entries == expected
            end
          end
          puts 'legacy fixture migration parity ok'
          RUBY
        result: "pass; migrated data matches stripped legacy fixture rows with required metadata"
    commit:
      hash: not_required
      message: "T03 completed without commit; implementation remains uncommitted while subagent delivery continues."

